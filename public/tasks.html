<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tasks | SoftSys Manager</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, sans-serif; }
        body { background: #f0f2f5; }
        .header { background: white; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; }
        .logo { font-size: 22px; font-weight: 700; color: #1e293b; }
        .logo span { color: #6366f1; }
        .nav { display: flex; gap: 20px; flex-wrap: wrap; }
        .nav a { text-decoration: none; color: #64748b; font-weight: 500; }
        .nav a:hover { color: #6366f1; }
        .container { max-width: 1200px; margin: 0 auto; padding: 30px 20px; }
        .card { background: white; border-radius: 16px; padding: 25px; margin-bottom: 25px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        .card h2 { margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; }
        .btn { padding: 10px 20px; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; background: #6366f1; color: white; }
        .btn-danger { background: #ef4444; }
        .btn-success { background: #10b981; }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 12px; background: #f8fafc; border-bottom: 2px solid #e2e8f0; }
        td { padding: 12px; border-bottom: 1px solid #e2e8f0; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: 600; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 10px; border: 1px solid #e2e8f0; border-radius: 8px; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; }
        .modal-content { background: white; border-radius: 16px; padding: 25px; width: 90%; max-width: 500px; }
        .modal-buttons { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }
        .badge { display: inline-block; padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; }
        .badge-pending { background: #fef3c7; color: #92400e; }
        .badge-completed { background: #d1fae5; color: #065f46; }
        .priority-high { color: #dc2626; font-weight: bold; }
        .priority-medium { color: #f59e0b; }
        .priority-low { color: #10b981; }
        @media (max-width: 768px) { .header { flex-direction: column; text-align: center; } table { font-size: 12px; } }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">SoftSys<span>Solutions</span></div>
        <div class="nav">
            <a href="dashboard.html">Dashboard</a>
            <a href="clients.html">Clients</a>
            <a href="projects.html">Projects</a>
            <a href="invoices.html">Invoices</a>
            <a href="tasks.html">Tasks</a>
        </div>
    </div>
    
    <div class="container">
        <div class="card">
            <h2>✅ Tasks <button class="btn" onclick="openAddModal()">+ Add Task</button></h2>
            <div id="tasksTable"></div>
        </div>
    </div>
    
    <div id="taskModal" class="modal">
        <div class="modal-content">
            <h3 id="modalTitle">Add Task</h3>
            <input type="hidden" id="taskId">
            <div class="form-group"><label>Task Title</label><input type="text" id="taskTitle" placeholder="Task title"></div>
            <div class="form-group"><label>Project</label><select id="taskProjectId"></select></div>
            <div class="form-group"><label>Description</label><textarea id="taskDesc" rows="3" placeholder="Task description"></textarea></div>
            <div class="form-group"><label>Priority</label><select id="taskPriority"><option value="low">Low</option><option value="medium">Medium</option><option value="high">High</option></select></div>
            <div class="form-group"><label>Status</label><select id="taskStatus"><option value="pending">Pending</option><option value="completed">Completed</option></select></div>
            <div class="form-group"><label>Due Date</label><input type="date" id="taskDueDate"></div>
            <div class="modal-buttons"><button class="btn" onclick="saveTask()">Save</button><button class="btn btn-danger" onclick="closeModal()">Cancel</button></div>
        </div>
    </div>
    
    <script src="config.js"></script>
    <script>
        let tasks = [];
        let projects = [];
        
        async function loadProjects() {
            const res = await fetch(API_URL + '/api/projects');
            projects = await res.json();
        }
        
        async function loadTasks() {
            try {
                const res = await fetch(API_URL + '/api/tasks');
                tasks = await res.json();
                renderTable();
            } catch (error) { console.error('Error:', error); }
        }
        
        function getPriorityClass(priority) {
            if (priority === 'high') return 'priority-high';
            if (priority === 'medium') return 'priority-medium';
            return 'priority-low';
        }
        
        function getStatusBadge(status) {
            if (status === 'completed') return '<span class="badge badge-completed">✅ Completed</span>';
            return '<span class="badge badge-pending">⏳ Pending</span>';
        }
        
        function renderTable() {
            const container = document.getElementById('tasksTable');
            if (tasks.length === 0) {
                container.innerHTML = '<p style="text-align:center; padding:40px;">No tasks yet. Click "Add Task" to get started.</p>';
                return;
            }
            let html = '<tr><thead><tr><th>Title</th><th>Project</th><th>Priority</th><th>Status</th><th>Due Date</th><th>Actions</th></tr></thead><tbody>';
            tasks.forEach(t => {
                html += `<tr><td>${t.title}</td><td>${t.project_name || '-'}</td><td><span class="${getPriorityClass(t.priority)}">${t.priority}</span></td><td>${getStatusBadge(t.status)}</span></td><td>${t.due_date || '-'}</td><td><button class="btn btn-success" onclick="markComplete(${t.id})" ${t.status === 'completed' ? 'disabled' : ''}>Complete</button> <button class="btn btn-danger" onclick="deleteTask(${t.id})">Delete</button></td></tr>`;
            });
            html += '</tbody></table>';
            container.innerHTML = html;
        }
        
        function loadProjectSelect() {
            const select = document.getElementById('taskProjectId');
            select.innerHTML = '<option value="">Select Project</option>';
            projects.forEach(p => { select.innerHTML += `<option value="${p.id}">${p.name}</option>`; });
        }
        
        function openAddModal() {
            document.getElementById('modalTitle').innerText = 'Add Task';
            document.getElementById('taskId').value = '';
            document.getElementById('taskTitle').value = '';
            document.getElementById('taskDesc').value = '';
            document.getElementById('taskPriority').value = 'medium';
            document.getElementById('taskStatus').value = 'pending';
            document.getElementById('taskDueDate').value = '';
            loadProjectSelect();
            document.getElementById('taskModal').style.display = 'flex';
        }
        
        async function markComplete(id) {
            if (confirm('Mark this task as completed?')) {
                await fetch(API_URL + `/api/tasks/${id}`, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ status: 'completed' }) });
                loadTasks();
            }
        }
        
        async function saveTask() {
            const id = document.getElementById('taskId').value;
            const taskData = {
                project_id: document.getElementById('taskProjectId').value,
                title: document.getElementById('taskTitle').value,
                description: document.getElementById('taskDesc').value,
                priority: document.getElementById('taskPriority').value,
                status: document.getElementById('taskStatus').value,
                due_date: document.getElementById('taskDueDate').value
            };
            if (!taskData.title) { alert('Please enter a task title'); return; }
            try {
                let res;
                if (id) {
                    res = await fetch(API_URL + `/api/tasks/${id}`, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(taskData) });
                } else {
                    res = await fetch(API_URL + '/api/tasks', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(taskData) });
                }
                if (res.ok) { closeModal(); loadTasks(); }
            } catch (error) { console.error('Error:', error); }
        }
        
        async function deleteTask(id) {
            if (confirm('Delete this task?')) {
                await fetch(API_URL + `/api/tasks/${id}`, { method: 'DELETE' });
                loadTasks();
            }
        }
        
        function closeModal() { document.getElementById('taskModal').style.display = 'none'; }
        
        loadProjects();
        loadTasks();
    </script>
</body>
</html>
