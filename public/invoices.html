<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invoices | SoftSys Manager</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, sans-serif; }
        body { background: #f0f2f5; }
        .header { background: white; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; }
        .logo { font-size: 22px; font-weight: 700; color: #1e293b; }
        .logo span { color: #6366f1; }
        .nav { display: flex; gap: 20px; flex-wrap: wrap; }
        .nav a { text-decoration: none; color: #64748b; font-weight: 500; }
        .nav a:hover { color: #6366f1; }
        .container { max-width: 1200px; margin: 0 auto; padding: 30px 20px; }
        .card { background: white; border-radius: 16px; padding: 25px; margin-bottom: 25px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        .card h2 { margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; }
        .btn { padding: 10px 20px; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; background: #6366f1; color: white; }
        .btn-danger { background: #ef4444; }
        .btn-success { background: #10b981; }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 12px; background: #f8fafc; border-bottom: 2px solid #e2e8f0; }
        td { padding: 12px; border-bottom: 1px solid #e2e8f0; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: 600; }
        .form-group input, .form-group select { width: 100%; padding: 10px; border: 1px solid #e2e8f0; border-radius: 8px; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; }
        .modal-content { background: white; border-radius: 16px; padding: 25px; width: 90%; max-width: 500px; }
        .modal-buttons { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }
        .badge { display: inline-block; padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; }
        .badge-paid { background: #d1fae5; color: #065f46; }
        .badge-unpaid { background: #fee2e2; color: #991b1b; }
        @media (max-width: 768px) { .header { flex-direction: column; text-align: center; } table { font-size: 12px; } }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">SoftSys<span>Solutions</span></div>
        <div class="nav">
            <a href="dashboard.html">Dashboard</a>
            <a href="clients.html">Clients</a>
            <a href="projects.html">Projects</a>
            <a href="invoices.html">Invoices</a>
            <a href="tasks.html">Tasks</a>
        </div>
    </div>
    
    <div class="container">
        <div class="card">
            <h2>🧾 Invoices <button class="btn" onclick="openAddModal()">+ Create Invoice</button></h2>
            <div id="invoicesTable"></div>
        </div>
    </div>
    
    <div id="invoiceModal" class="modal">
        <div class="modal-content">
            <h3 id="modalTitle">Create Invoice</h3>
            <input type="hidden" id="invoiceId">
            <div class="form-group"><label>Client</label><select id="invoiceClientId"></select></div>
            <div class="form-group"><label>Invoice Number</label><input type="text" id="invoiceNumber" placeholder="INV-001"></div>
            <div class="form-group"><label>Amount (₵)</label><input type="number" id="invoiceAmount" placeholder="0.00"></div>
            <div class="form-group"><label>Status</label><select id="invoiceStatus"><option value="unpaid">Unpaid</option><option value="paid">Paid</option></select></div>
            <div class="form-group"><label>Due Date</label><input type="date" id="invoiceDueDate"></div>
            <div class="modal-buttons"><button class="btn" onclick="saveInvoice()">Save</button><button class="btn btn-danger" onclick="closeModal()">Cancel</button></div>
        </div>
    </div>
    
    <script src="config.js"></script>
    <script>
        let invoices = [];
        let clients = [];
        
        async function loadClients() {
            const res = await fetch(API_URL + '/api/clients');
            clients = await res.json();
        }
        
        async function loadInvoices() {
            try {
                const res = await fetch(API_URL + '/api/invoices');
                invoices = await res.json();
                renderTable();
            } catch (error) { console.error('Error:', error); }
        }
        
        function getStatusBadge(status) {
            if (status === 'paid') return '<span class="badge badge-paid">✅ Paid</span>';
            return '<span class="badge badge-unpaid">⏳ Unpaid</span>';
        }
        
        function renderTable() {
            const container = document.getElementById('invoicesTable');
            if (invoices.length === 0) {
                container.innerHTML = '<p style="text-align:center; padding:40px;">No invoices yet. Click "Create Invoice" to get started.</p>';
                return;
            }
            let html = '</table><thead><tr><th>Invoice #</th><th>Client</th><th>Amount</th><th>Status</th><th>Due Date</th><th>Actions</th></tr></thead><tbody>';
            invoices.forEach(i => {
                html += `<tr><td>${i.invoice_number}</td><td>${i.client_name || '-'}</td><td>₵${i.amount}</td><td>${getStatusBadge(i.status)}</td><td>${i.due_date || '-'}</td><td><button class="btn btn-success" onclick="markAsPaid(${i.id})" ${i.status === 'paid' ? 'disabled' : ''}>Mark Paid</button> <button class="btn btn-danger" onclick="deleteInvoice(${i.id})">Delete</button></td></tr>`;
            });
            html += '</tbody></table>';
            container.innerHTML = html;
        }
        
        function loadClientSelect() {
            const select = document.getElementById('invoiceClientId');
            select.innerHTML = '<option value="">Select Client</option>';
            clients.forEach(c => { select.innerHTML += `<option value="${c.id}">${c.name}</option>`; });
        }
        
        function openAddModal() {
            document.getElementById('modalTitle').innerText = 'Create Invoice';
            document.getElementById('invoiceId').value = '';
            document.getElementById('invoiceNumber').value = '';
            document.getElementById('invoiceAmount').value = '';
            document.getElementById('invoiceStatus').value = 'unpaid';
            document.getElementById('invoiceDueDate').value = '';
            loadClientSelect();
            document.getElementById('invoiceModal').style.display = 'flex';
        }
        
        async function markAsPaid(id) {
            if (confirm('Mark this invoice as paid?')) {
                await fetch(API_URL + `/api/invoices/${id}`, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ status: 'paid', paid_date: new Date().toISOString().split('T')[0] }) });
                loadInvoices();
            }
        }
        
        async function saveInvoice() {
            const id = document.getElementById('invoiceId').value;
            const invoiceData = {
                client_id: document.getElementById('invoiceClientId').value,
                invoice_number: document.getElementById('invoiceNumber').value,
                amount: document.getElementById('invoiceAmount').value,
                status: document.getElementById('invoiceStatus').value,
                due_date: document.getElementById('invoiceDueDate').value
            };
            if (!invoiceData.client_id || !invoiceData.invoice_number || !invoiceData.amount) { alert('Please fill all required fields'); return; }
            try {
                let res;
                if (id) {
                    res = await fetch(API_URL + `/api/invoices/${id}`, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(invoiceData) });
                } else {
                    res = await fetch(API_URL + '/api/invoices', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(invoiceData) });
                }
                if (res.ok) { closeModal(); loadInvoices(); }
            } catch (error) { console.error('Error:', error); }
        }
        
        async function deleteInvoice(id) {
            if (confirm('Delete this invoice?')) {
                await fetch(API_URL + `/api/invoices/${id}`, { method: 'DELETE' });
                loadInvoices();
            }
        }
        
        function closeModal() { document.getElementById('invoiceModal').style.display = 'none'; }
        
        loadClients();
        loadInvoices();
    </script>
</body>
</html>
