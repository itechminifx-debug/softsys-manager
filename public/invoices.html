<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invoices | SoftSys Manager</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, sans-serif; }
        body { background: #f0f2f5; }
        .header { background: white; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; }
        .logo { font-size: 22px; font-weight: 700; color: #1e293b; }
        .logo span { color: #6366f1; }
        .nav { display: flex; gap: 20px; flex-wrap: wrap; }
        .nav a { text-decoration: none; color: #64748b; font-weight: 500; }
        .nav a:hover { color: #6366f1; }
        .container { max-width: 1200px; margin: 0 auto; padding: 30px 20px; }
        .card { background: white; border-radius: 16px; padding: 25px; margin-bottom: 25px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        .card h2 { margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; }
        .btn { padding: 10px 20px; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; background: #6366f1; color: white; }
        .btn-danger { background: #ef4444; }
        .btn-success { background: #10b981; }
        .btn-print { background: #1e293b; }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 12px; background: #f8fafc; border-bottom: 2px solid #e2e8f0; }
        td { padding: 12px; border-bottom: 1px solid #e2e8f0; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: 600; }
        .form-group input, .form-group select { width: 100%; padding: 10px; border: 1px solid #e2e8f0; border-radius: 8px; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; }
        .modal-content { background: white; border-radius: 16px; padding: 25px; width: 90%; max-width: 500px; }
        .modal-buttons { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }
        .badge { display: inline-block; padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; }
        .badge-paid { background: #d1fae5; color: #065f46; }
        .badge-unpaid { background: #fee2e2; color: #991b1b; }
        .toast { position: fixed; bottom: 20px; right: 20px; background: #10b981; color: white; padding: 12px 20px; border-radius: 8px; display: none; z-index: 1000; }
        @media (max-width: 768px) { .header { flex-direction: column; text-align: center; } table { font-size: 12px; } }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">SoftSys<span>Solutions</span></div>
        <div class="nav">
            <a href="dashboard.html">Dashboard</a>
            <a href="clients.html">Clients</a>
            <a href="projects.html">Projects</a>
            <a href="invoices.html">Invoices</a>
            <a href="tasks.html">Tasks</a>
        </div>
    </div>
    
    <div class="container">
        <div class="card">
            <h2>🧾 Invoices <button class="btn" onclick="openAddModal()">+ Create Invoice</button></h2>
            <div id="invoicesTable">Loading invoices...</div>
        </div>
    </div>
    
    <div id="invoiceModal" class="modal">
        <div class="modal-content">
            <h3 id="modalTitle">Create Invoice</h3>
            <input type="hidden" id="invoiceId">
            <div class="form-group"><label>Client</label><select id="invoiceClientId"></select></div>
            <div class="form-group"><label>Invoice Number</label><input type="text" id="invoiceNumber" placeholder="INV-001"></div>
            <div class="form-group"><label>Amount (₵)</label><input type="number" id="invoiceAmount" placeholder="0.00" step="0.01"></div>
            <div class="form-group"><label>Status</label><select id="invoiceStatus"><option value="unpaid">Unpaid</option><option value="paid">Paid</option></select></div>
            <div class="form-group"><label>Due Date</label><input type="date" id="invoiceDueDate"></div>
            <div class="modal-buttons"><button class="btn" onclick="saveInvoice()">Save</button><button class="btn btn-danger" onclick="closeModal()">Cancel</button></div>
        </div>
    </div>
    
    <div id="toast" class="toast"></div>

    <script>
        // API URL - uses current domain
        const API_URL = '';
        
        let invoices = [];
        let clients = [];
        
        // ========== UPDATE YOUR COMPANY DETAILS HERE ==========
        const COMPANY_NAME = "SoftSys Solutions";
        const COMPANY_ADDRESS = "123 Business Street, Accra - Ghana";
        const COMPANY_EMAIL = "info@softsys.com";
        const COMPANY_PHONE = "+233 XX XXX XXXX";
        const COMPANY_WEBSITE = "www.softsys.com";
        // ======================================================
        
        // Show toast message
        function showToast(message, isError = false) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.style.backgroundColor = isError ? '#ef4444' : '#10b981';
            toast.style.display = 'block';
            setTimeout(() => {
                toast.style.display = 'none';
            }, 3000);
        }
        
        // LOAD CLIENTS FROM DATABASE
        async function loadClients() {
            try {
                const res = await fetch(API_URL + '/api/clients');
                if (!res.ok) throw new Error('Failed to load clients');
                clients = await res.json();
                console.log('Clients loaded:', clients.length);
            } catch (error) {
                console.error('Error loading clients:', error);
                showToast('Error loading clients', true);
            }
        }
        
        // LOAD INVOICES FROM DATABASE
        async function loadInvoices() {
            try {
                const res = await fetch(API_URL + '/api/invoices');
                if (!res.ok) throw new Error('Failed to load invoices');
                invoices = await res.json();
                console.log('Invoices loaded:', invoices.length);
                renderTable();
            } catch (error) { 
                console.error('Error loading invoices:', error);
                document.getElementById('invoicesTable').innerHTML = '<p style="text-align:center; padding:40px;">Error loading invoices. Please refresh.</p>';
            }
        }
        
        function getStatusBadge(status) {
            if (status === 'paid') return '<span class="badge badge-paid">✅ Paid</span>';
            return '<span class="badge badge-unpaid">⏳ Unpaid</span>';
        }
        
        function renderTable() {
            const container = document.getElementById('invoicesTable');
            if (invoices.length === 0) {
                container.innerHTML = '<p style="text-align:center; padding:40px;">No invoices yet. Click "Create Invoice" to get started.</p>';
                return;
            }
            let html = '<table><thead><tr><th>Invoice #</th><th>Client</th><th>Amount</th><th>Status</th><th>Due Date</th><th>Actions</th></tr></thead><tbody>';
            invoices.forEach(i => {
                const client = clients.find(c => c.id == i.client_id);
                html += `
                    <tr>
                        <td><strong>${i.invoice_number}</strong></td>
                        <td>${client ? client.name : 'Unknown Client'}</td>
                        <td>₵${parseFloat(i.amount).toFixed(2)}</td>
                        <td>${getStatusBadge(i.status)}</td>
                        <td>${i.due_date || '-'}</td>
                        <td>
                            <button class="btn btn-print" onclick="printInvoice(${i.id})">🖨️ Print</button>
                            <button class="btn btn-success" onclick="markAsPaid(${i.id})" ${i.status === 'paid' ? 'disabled' : ''}>Mark Paid</button>
                            <button class="btn btn-danger" onclick="deleteInvoice(${i.id})">Delete</button>
                        </td>
                    </tr>
                `;
            });
            html += '</tbody><table>';
            container.innerHTML = html;
        }
        
        function loadClientSelect() {
            const select = document.getElementById('invoiceClientId');
            select.innerHTML = '<option value="">Select Client</option>';
            clients.forEach(c => { select.innerHTML += `<option value="${c.id}">${c.name}</option>`; });
        }
        
        function openAddModal() {
            document.getElementById('modalTitle').innerText = 'Create Invoice';
            document.getElementById('invoiceId').value = '';
            document.getElementById('invoiceNumber').value = '';
            document.getElementById('invoiceAmount').value = '';
            document.getElementById('invoiceStatus').value = 'unpaid';
            document.getElementById('invoiceDueDate').value = '';
            loadClientSelect();
            document.getElementById('invoiceModal').style.display = 'flex';
        }
        
        function editInvoice(id) {
            const invoice = invoices.find(i => i.id === id);
            if (!invoice) return;
            const client = clients.find(c => c.id == invoice.client_id);
            document.getElementById('modalTitle').innerText = 'Edit Invoice';
            document.getElementById('invoiceId').value = invoice.id;
            document.getElementById('invoiceNumber').value = invoice.invoice_number;
            document.getElementById('invoiceAmount').value = invoice.amount;
            document.getElementById('invoiceStatus').value = invoice.status;
            document.getElementById('invoiceDueDate').value = invoice.due_date || '';
            loadClientSelect();
            document.getElementById('invoiceClientId').value = invoice.client_id;
            document.getElementById('invoiceModal').style.display = 'flex';
        }
        
        // PRINT INVOICE FUNCTION
        function printInvoice(id) {
            const invoice = invoices.find(i => i.id === id);
            const client = clients.find(c => c.id == invoice.client_id);
            
            if (!invoice || !client) return;
            
            const printWindow = window.open('', '_blank', 'width=800,height=600');
            const today = new Date();
            const formattedDate = today.toLocaleDateString();
            
            printWindow.document.write(`
                <!DOCTYPE html>
                <html>
                <head>
                    <title>Invoice ${invoice.invoice_number}</title>
                    <style>
                        body { font-family: 'Times New Roman', serif; margin: 0; padding: 40px; }
                        .invoice-container { max-width: 800px; margin: 0 auto; background: white; }
                        .invoice-header { text-align: center; margin-bottom: 30px; padding-bottom: 20px; border-bottom: 2px solid #6366f1; }
                        .invoice-header h1 { font-size: 32px; color: #6366f1; margin-bottom: 10px; }
                        .invoice-header .company-details { color: #64748b; font-size: 14px; line-height: 1.5; }
                        .invoice-details { display: flex; justify-content: space-between; margin-bottom: 30px; }
                        .invoice-bill-to h4, .invoice-info h4 { margin-bottom: 10px; color: #1e293b; }
                        .invoice-bill-to p, .invoice-info p { margin: 5px 0; color: #475569; }
                        .invoice-table { width: 100%; border-collapse: collapse; margin: 20px 0; }
                        .invoice-table th { background: #f8fafc; padding: 12px; text-align: left; border-bottom: 2px solid #e2e8f0; }
                        .invoice-table td { padding: 12px; border-bottom: 1px solid #e2e8f0; }
                        .invoice-total { text-align: right; margin-top: 20px; padding-top: 20px; border-top: 2px solid #e2e8f0; }
                        .invoice-total h3 { color: #1e293b; }
                        .invoice-footer { text-align: center; margin-top: 40px; padding-top: 20px; border-top: 1px solid #e2e8f0; font-size: 12px; color: #64748b; }
                        @media print { body { padding: 0; } }
                    </style>
                </head>
                <body>
                    <div class="invoice-container">
                        <div class="invoice-header">
                            <h1>${COMPANY_NAME}</h1>
                            <div class="company-details">
                                <p>${COMPANY_ADDRESS}</p>
                                <p>📧 ${COMPANY_EMAIL} | 📞 ${COMPANY_PHONE} | 🌐 ${COMPANY_WEBSITE}</p>
                            </div>
                        </div>
                        <div class="invoice-details">
                            <div class="invoice-bill-to">
                                <h4>Bill To:</h4>
                                <p><strong>${client.name}</strong></p>
                                <p>${client.email || ''}</p>
                                <p>${client.phone || ''}</p>
                                <p>${client.address || ''}</p>
                            </div>
                            <div class="invoice-info">
                                <h4>Invoice Details:</h4>
                                <p><strong>Invoice Number:</strong> ${invoice.invoice_number}</p>
                                <p><strong>Date:</strong> ${formattedDate}</p>
                                <p><strong>Due Date:</strong> ${invoice.due_date || 'Upon Receipt'}</p>
                                <p><strong>Status:</strong> ${invoice.status === 'paid' ? 'PAID' : 'PENDING'}</p>
                            </div>
                        </div>
                        <table class="invoice-table">
                            <thead><tr><th>Description</th><th>Quantity</th><th>Unit Price</th><th>Total</th></tr></thead>
                            <tbody>
                                <tr>
                                    <td>Professional Services - ${invoice.invoice_number}</td>
                                    <td>1</td>
                                    <td>₵${parseFloat(invoice.amount).toFixed(2)}</td>
                                    <td>₵${parseFloat(invoice.amount).toFixed(2)}</td>
                                </tr>
                            </tbody>
                        </table>
                        <div class="invoice-total">
                            <h3>Total Amount: ₵${parseFloat(invoice.amount).toFixed(2)}</h3>
                        </div>
                        <div class="invoice-footer">
                            <p>Thank you for your business!</p>
                            <p>Payment Terms: Please pay within 30 days.</p>
                        </div>
                    </div>
                    <script>
                        window.onload = function() {
                            window.print();
                            setTimeout(function() { window.close(); }, 500);
                        };
                    <\/script>
                </body>
                </html>
            `);
            
            printWindow.document.close();
        }
        
        // MARK INVOICE AS PAID
        async function markAsPaid(id) {
            if (confirm('Mark this invoice as paid?')) {
                try {
                    const res = await fetch(API_URL + `/api/invoices/${id}`, { 
                        method: 'PUT', 
                        headers: { 'Content-Type': 'application/json' }, 
                        body: JSON.stringify({ status: 'paid', paid_date: new Date().toISOString().split('T')[0] }) 
                    });
                    if (res.ok) {
                        await loadInvoices();
                        showToast('Invoice marked as paid!');
                    } else {
                        throw new Error('Failed to update');
                    }
                } catch (error) {
                    console.error('Error:', error);
                    showToast('Failed to update invoice', true);
                }
            }
        }
        
        // SAVE INVOICE TO DATABASE
        async function saveInvoice() {
            const id = document.getElementById('invoiceId').value;
            const invoiceData = {
                client_id: parseInt(document.getElementById('invoiceClientId').value),
                invoice_number: document.getElementById('invoiceNumber').value,
                amount: parseFloat(document.getElementById('invoiceAmount').value),
                status: document.getElementById('invoiceStatus').value,
                due_date: document.getElementById('invoiceDueDate').value
            };
            
            if (!invoiceData.client_id || !invoiceData.invoice_number || isNaN(invoiceData.amount)) { 
                alert('Please fill all required fields'); 
                return; 
            }
            
            try {
                let res;
                if (id) {
                    res = await fetch(API_URL + `/api/invoices/${id}`, { 
                        method: 'PUT', 
                        headers: { 'Content-Type': 'application/json' }, 
                        body: JSON.stringify(invoiceData) 
                    });
                } else {
                    res = await fetch(API_URL + '/api/invoices', { 
                        method: 'POST', 
                        headers: { 'Content-Type': 'application/json' }, 
                        body: JSON.stringify(invoiceData) 
                    });
                }
                if (res.ok) { 
                    closeModal(); 
                    await loadInvoices();
                    showToast(id ? 'Invoice updated!' : 'Invoice created!');
                } else {
                    throw new Error('Save failed');
                }
            } catch (error) { 
                console.error('Error:', error);
                alert('Failed to save invoice');
            }
        }
        
        // DELETE INVOICE
        async function deleteInvoice(id) {
            if (confirm('Delete this invoice?')) {
                try {
                    const res = await fetch(API_URL + `/api/invoices/${id}`, { method: 'DELETE' });
                    if (res.ok) {
                        await loadInvoices();
                        showToast('Invoice deleted!');
                    } else {
                        throw new Error('Delete failed');
                    }
                } catch (error) {
                    console.error('Error:', error);
                    alert('Failed to delete invoice');
                }
            }
        }
        
        function closeModal() { 
            document.getElementById('invoiceModal').style.display = 'none'; 
        }
        
        // INITIALIZE - LOAD ALL DATA
        async function init() {
            await loadClients();
            await loadInvoices();
        }
        
        init();
    </script>
</body>
</html>
