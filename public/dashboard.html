<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | SoftSys Manager</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, sans-serif;
        }
        
        body {
            background: #f0f2f5;
        }
        
        .header {
            background: white;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            flex-wrap: wrap;
        }
        
        .logo {
            font-size: 22px;
            font-weight: 700;
            color: #1e293b;
        }
        
        .logo span {
            color: #6366f1;
        }
        
        .nav {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }
        
        .nav a {
            text-decoration: none;
            color: #64748b;
            font-weight: 500;
        }
        
        .nav a:hover {
            color: #6366f1;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 30px 20px;
        }
        
        .welcome {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
            padding: 40px;
            border-radius: 20px;
            margin-bottom: 30px;
        }
        
        .welcome h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: white;
            padding: 25px;
            border-radius: 16px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        
        .stat-card h3 {
            font-size: 32px;
            color: #6366f1;
            margin-bottom: 5px;
        }
        
        .stat-card p {
            color: #64748b;
        }
        
        .recent {
            background: white;
            border-radius: 16px;
            padding: 25px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        
        .recent h3 {
            margin-bottom: 15px;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        th {
            text-align: left;
            padding: 10px;
            background: #f8fafc;
        }
        
        td {
            padding: 10px;
            border-bottom: 1px solid #e2e8f0;
        }
        
        @media (max-width: 768px) {
            .header { flex-direction: column; text-align: center; }
            .stats { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">SoftSys<span>Solutions</span></div>
        <div class="nav">
            <a href="dashboard.html">Dashboard</a>
            <a href="clients.html">Clients</a>
            <a href="projects.html">Projects</a>
            <a href="invoices.html">Invoices</a>
            <a href="tasks.html">Tasks</a>
        </div>
    </div>
    
    <div class="container">
        <div class="welcome">
            <h1>Welcome to SoftSys Manager</h1>
            <p>Manage your clients, projects, invoices, and tasks from one place.</p>
        </div>
        
        <div class="stats">
            <div class="stat-card">
                <h3 id="totalClients">0</h3>
                <p>Total Clients</p>
            </div>
            <div class="stat-card">
                <h3 id="totalProjects">0</h3>
                <p>Active Projects</p>
            </div>
            <div class="stat-card">
                <h3 id="totalRevenue">₵0</h3>
                <p>Total Revenue</p>
            </div>
            <div class="stat-card">
                <h3 id="pendingTasks">0</h3>
                <p>Pending Tasks</p>
            </div>
        </div>
        
        <div class="recent">
            <h3>📋 Recent Clients</h3>
            <div id="recentClients"></div>
        </div>
    </div>
    
    <script>
        async function loadStats() {
            try {
                const res = await fetch('/api/dashboard/stats');
                const data = await res.json();
                
                document.getElementById('totalClients').innerText = data.totalClients || 0;
                document.getElementById('totalProjects').innerText = data.totalProjects || 0;
                document.getElementById('totalRevenue').innerHTML = `₵${data.totalRevenue || 0}`;
                document.getElementById('pendingTasks').innerText = data.pendingTasks || 0;
            } catch (error) {
                console.error('Error:', error);
            }
        }
        
        async function loadRecentClients() {
            try {
                const res = await fetch('/api/clients');
                const clients = await res.json();
                const recent = clients.slice(0, 5);
                
                if (recent.length === 0) {
                    document.getElementById('recentClients').innerHTML = '<p>No clients yet.</p>';
                    return;
                }
                
                let html = '<tr><thead><td><th>Name</th><th>Email</th><th>Company</th></tr></thead><tbody>';
                recent.forEach(c => {
                    html += `<tr><td>${c.name}</td><td>${c.email || '-'}</td><td>${c.company || '-'}</td></tr>`;
                });
                html += '</tbody></table>';
                document.getElementById('recentClients').innerHTML = html;
            } catch (error) {
                console.error('Error:', error);
            }
        }
        
        loadStats();
        loadRecentClients();
    </script>
</body>
</html>
