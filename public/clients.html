<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clients | SoftSys Manager</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, sans-serif;
        }
        
        body {
            background: #f0f2f5;
        }
        
        .header {
            background: white;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            flex-wrap: wrap;
        }
        
        .logo {
            font-size: 22px;
            font-weight: 700;
            color: #1e293b;
        }
        
        .logo span {
            color: #6366f1;
        }
        
        .nav {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }
        
        .nav a {
            text-decoration: none;
            color: #64748b;
            font-weight: 500;
        }
        
        .nav a:hover {
            color: #6366f1;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 30px 20px;
        }
        
        .card {
            background: white;
            border-radius: 16px;
            padding: 25px;
            margin-bottom: 25px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        
        .card h2 {
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            background: #6366f1;
            color: white;
        }
        
        .btn-danger {
            background: #ef4444;
        }
        
        .btn-warning {
            background: #f59e0b;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        th {
            text-align: left;
            padding: 12px;
            background: #f8fafc;
            border-bottom: 2px solid #e2e8f0;
        }
        
        td {
            padding: 12px;
            border-bottom: 1px solid #e2e8f0;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
        }
        
        .form-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
        }
        
        .modal-content {
            background: white;
            border-radius: 16px;
            padding: 25px;
            width: 90%;
            max-width: 500px;
        }
        
        .modal-buttons {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 20px;
        }
        
        @media (max-width: 768px) {
            .header { flex-direction: column; text-align: center; }
            table { font-size: 12px; }
            th, td { padding: 8px; }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">SoftSys<span>Solutions</span></div>
        <div class="nav">
            <a href="dashboard.html">Dashboard</a>
            <a href="clients.html">Clients</a>
            <a href="projects.html">Projects</a>
            <a href="invoices.html">Invoices</a>
            <a href="tasks.html">Tasks</a>
        </div>
    </div>
    
    <div class="container">
        <div class="card">
            <h2>
                👥 Clients
                <button class="btn" onclick="openAddModal()">+ Add Client</button>
            </h2>
            <div id="clientsTable"></div>
        </div>
    </div>
    
    <!-- Add/Edit Modal -->
    <div id="clientModal" class="modal">
        <div class="modal-content">
            <h3 id="modalTitle">Add Client</h3>
            <input type="hidden" id="clientId">
            <div class="form-group">
                <label>Name</label>
                <input type="text" id="clientName" placeholder="Client name">
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="clientEmail" placeholder="Email">
            </div>
            <div class="form-group">
                <label>Phone</label>
                <input type="text" id="clientPhone" placeholder="Phone">
            </div>
            <div class="form-group">
                <label>Company</label>
                <input type="text" id="clientCompany" placeholder="Company">
            </div>
            <div class="form-group">
                <label>Address</label>
                <input type="text" id="clientAddress" placeholder="Address">
            </div>
            <div class="modal-buttons">
                <button class="btn" onclick="saveClient()">Save</button>
                <button class="btn btn-danger" onclick="closeModal()">Cancel</button>
            </div>
        </div>
    </div>
    
    <script>
        let clients = [];
        
        async function loadClients() {
            try {
                const res = await fetch('/api/clients');
                clients = await res.json();
                renderTable();
            } catch (error) {
                console.error('Error:', error);
            }
        }
        
        function renderTable() {
            const container = document.getElementById('clientsTable');
            if (clients.length === 0) {
                container.innerHTML = '<p style="text-align:center; padding:40px;">No clients yet. Click "Add Client" to get started.</p>';
                return;
            }
            
            let html = '<table><thead><tr><th>Name</th><th>Email</th><th>Phone</th><th>Company</th><th>Actions</th></tr></thead><tbody>';
            clients.forEach(c => {
                html += `
                    <tr>
                        <td>${c.name}</td>
                        <td>${c.email || '-'}</td>
                        <td>${c.phone || '-'}</td>
                        <td>${c.company || '-'}</td>
                        <td>
                            <button class="btn" style="background:#f59e0b;" onclick="editClient(${c.id})">Edit</button>
                            <button class="btn btn-danger" onclick="deleteClient(${c.id})">Delete</button>
                        </td>
                    </tr>
                `;
            });
            html += '</tbody></table>';
            container.innerHTML = html;
        }
        
        function openAddModal() {
            document.getElementById('modalTitle').innerText = 'Add Client';
            document.getElementById('clientId').value = '';
            document.getElementById('clientName').value = '';
            document.getElementById('clientEmail').value = '';
            document.getElementById('clientPhone').value = '';
            document.getElementById('clientCompany').value = '';
            document.getElementById('clientAddress').value = '';
            document.getElementById('clientModal').style.display = 'flex';
        }
        
        function editClient(id) {
            const client = clients.find(c => c.id === id);
            if (!client) return;
            
            document.getElementById('modalTitle').innerText = 'Edit Client';
            document.getElementById('clientId').value = client.id;
            document.getElementById('clientName').value = client.name;
            document.getElementById('clientEmail').value = client.email || '';
            document.getElementById('clientPhone').value = client.phone || '';
            document.getElementById('clientCompany').value = client.company || '';
            document.getElementById('clientAddress').value = client.address || '';
            document.getElementById('clientModal').style.display = 'flex';
        }
        
        async function saveClient() {
            const id = document.getElementById('clientId').value;
            const clientData = {
                name: document.getElementById('clientName').value,
                email: document.getElementById('clientEmail').value,
                phone: document.getElementById('clientPhone').value,
                company: document.getElementById('clientCompany').value,
                address: document.getElementById('clientAddress').value
            };
            
            try {
                let res;
                if (id) {
                    res = await fetch(`/api/clients/${id}`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(clientData)
                    });
                } else {
                    res = await fetch('/api/clients', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(clientData)
                    });
                }
                
                if (res.ok) {
                    closeModal();
                    loadClients();
                }
            } catch (error) {
                console.error('Error:', error);
            }
        }
        
        async function deleteClient(id) {
            if (confirm('Are you sure you want to delete this client?')) {
                await fetch(`/api/clients/${id}`, { method: 'DELETE' });
                loadClients();
            }
        }
        
        function closeModal() {
            document.getElementById('clientModal').style.display = 'none';
        }
        
        loadClients();
    </script>
</body>
</html>
