<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projects | SoftSys Manager</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, sans-serif;
        }
        
        body {
            background: #f0f2f5;
        }
        
        .header {
            background: white;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            flex-wrap: wrap;
        }
        
        .logo {
            font-size: 22px;
            font-weight: 700;
            color: #1e293b;
        }
        
        .logo span {
            color: #6366f1;
        }
        
        .nav {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }
        
        .nav a {
            text-decoration: none;
            color: #64748b;
            font-weight: 500;
        }
        
        .nav a:hover {
            color: #6366f1;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 30px 20px;
        }
        
        .card {
            background: white;
            border-radius: 16px;
            padding: 25px;
            margin-bottom: 25px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        
        .card h2 {
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            background: #6366f1;
            color: white;
        }
        
        .btn-danger {
            background: #ef4444;
        }
        
        .btn-warning {
            background: #f59e0b;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        th {
            text-align: left;
            padding: 12px;
            background: #f8fafc;
            border-bottom: 2px solid #e2e8f0;
        }
        
        td {
            padding: 12px;
            border-bottom: 1px solid #e2e8f0;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
        }
        
        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
        }
        
        .modal-content {
            background: white;
            border-radius: 16px;
            padding: 25px;
            width: 90%;
            max-width: 500px;
        }
        
        .modal-buttons {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 20px;
        }
        
        .badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
        }
        
        .badge-pending {
            background: #fef3c7;
            color: #92400e;
        }
        
        .badge-in-progress {
            background: #dbeafe;
            color: #1e40af;
        }
        
        .badge-completed {
            background: #d1fae5;
            color: #065f46;
        }
        
        @media (max-width: 768px) {
            .header { flex-direction: column; text-align: center; }
            table { font-size: 12px; }
            th, td { padding: 8px; }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">SoftSys<span>Solutions</span></div>
        <div class="nav">
            <a href="dashboard.html">Dashboard</a>
            <a href="clients.html">Clients</a>
            <a href="projects.html">Projects</a>
            <a href="invoices.html">Invoices</a>
            <a href="tasks.html">Tasks</a>
        </div>
    </div>
    
    <div class="container">
        <div class="card">
            <h2>
                📁 Projects
                <button class="btn" onclick="openAddModal()">+ Add Project</button>
            </h2>
            <div id="projectsTable"></div>
        </div>
    </div>
    
    <!-- Add/Edit Modal -->
    <div id="projectModal" class="modal">
        <div class="modal-content">
            <h3 id="modalTitle">Add Project</h3>
            <input type="hidden" id="projectId">
            <div class="form-group">
                <label>Project Name</label>
                <input type="text" id="projectName" placeholder="Project name">
            </div>
            <div class="form-group">
                <label>Client</label>
                <select id="projectClientId"></select>
            </div>
            <div class="form-group">
                <label>Description</label>
                <textarea id="projectDesc" rows="3" placeholder="Project description"></textarea>
            </div>
            <div class="form-group">
                <label>Status</label>
                <select id="projectStatus">
                    <option value="pending">Pending</option>
                    <option value="in-progress">In Progress</option>
                    <option value="completed">Completed</option>
                </select>
            </div>
            <div class="form-group">
                <label>Start Date</label>
                <input type="date" id="projectStartDate">
            </div>
            <div class="form-group">
                <label>End Date</label>
                <input type="date" id="projectEndDate">
            </div>
            <div class="form-group">
                <label>Budget (₵)</label>
                <input type="number" id="projectBudget" placeholder="0.00">
            </div>
            <div class="modal-buttons">
                <button class="btn" onclick="saveProject()">Save</button>
                <button class="btn btn-danger" onclick="closeModal()">Cancel</button>
            </div>
        </div>
    </div>
    
    <script>
        let projects = [];
        let clients = [];
        
        async function loadClients() {
            const res = await fetch('/api/clients');
            clients = await res.json();
        }
        
        async function loadProjects() {
            try {
                const res = await fetch('/api/projects');
                projects = await res.json();
                renderTable();
            } catch (error) {
                console.error('Error:', error);
            }
        }
        
        function getStatusBadge(status) {
            const badges = {
                'pending': '<span class="badge badge-pending">⏳ Pending</span>',
                'in-progress': '<span class="badge badge-in-progress">⚡ In Progress</span>',
                'completed': '<span class="badge badge-completed">✅ Completed</span>'
            };
            return badges[status] || status;
        }
        
        function renderTable() {
            const container = document.getElementById('projectsTable');
            if (projects.length === 0) {
                container.innerHTML = '<p style="text-align:center; padding:40px;">No projects yet. Click "Add Project" to get started.</p>';
                return;
            }
            
            let html = '<table><thead><tr><th>Name</th><th>Client</th><th>Status</th><th>Budget</th><th>End Date</th><th>Actions</th></tr></thead><tbody>';
            projects.forEach(p => {
                html += `
                    <tr>
                        <td>${p.name}</td>
                        <td>${p.client_name || '-'}</td>
                        <td>${getStatusBadge(p.status)}</span></td>
                        <td>₵${p.budget || 0}</span></td>
                        <td>${p.end_date || '-'}</span></td>
                        <td>
                            <button class="btn" style="background:#f59e0b;" onclick="editProject(${p.id})">Edit</button>
                            <button class="btn btn-danger" onclick="deleteProject(${p.id})">Delete</button>
                        </td>
                    </tr>
                `;
            });
            html += '</tbody></table>';
            container.innerHTML = html;
        }
        
        function loadClientSelect() {
            const select = document.getElementById('projectClientId');
            select.innerHTML = '<option value="">Select Client</option>';
            clients.forEach(c => {
                select.innerHTML += `<option value="${c.id}">${c.name}</option>`;
            });
        }
        
        function openAddModal() {
            document.getElementById('modalTitle').innerText = 'Add Project';
            document.getElementById('projectId').value = '';
            document.getElementById('projectName').value = '';
            document.getElementById('projectDesc').value = '';
            document.getElementById('projectStatus').value = 'pending';
            document.getElementById('projectStartDate').value = '';
            document.getElementById('projectEndDate').value = '';
            document.getElementById('projectBudget').value = '';
            loadClientSelect();
            document.getElementById('projectModal').style.display = 'flex';
        }
        
        function editProject(id) {
            const project = projects.find(p => p.id === id);
            if (!project) return;
            
            document.getElementById('modalTitle').innerText = 'Edit Project';
            document.getElementById('projectId').value = project.id;
            document.getElementById('projectName').value = project.name;
            document.getElementById('projectDesc').value = project.description || '';
            document.getElementById('projectStatus').value = project.status;
            document.getElementById('projectStartDate').value = project.start_date || '';
            document.getElementById('projectEndDate').value = project.end_date || '';
            document.getElementById('projectBudget').value = project.budget || '';
            loadClientSelect();
            document.getElementById('projectClientId').value = project.client_id;
            document.getElementById('projectModal').style.display = 'flex';
        }
        
        async function saveProject() {
            const id = document.getElementById('projectId').value;
            const projectData = {
                name: document.getElementById('projectName').value,
                client_id: document.getElementById('projectClientId').value,
                description: document.getElementById('projectDesc').value,
                status: document.getElementById('projectStatus').value,
                start_date: document.getElementById('projectStartDate').value,
                end_date: document.getElementById('projectEndDate').value,
                budget: document.getElementById('projectBudget').value
            };
            
            try {
                let res;
                if (id) {
                    res = await fetch(`/api/projects/${id}`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(projectData)
                    });
                } else {
                    res = await fetch('/api/projects', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(projectData)
                    });
                }
                
                if (res.ok) {
                    closeModal();
                    loadProjects();
                }
            } catch (error) {
                console.error('Error:', error);
            }
        }
        
        async function deleteProject(id) {
            if (confirm('Are you sure you want to delete this project?')) {
                await fetch(`/api/projects/${id}`, { method: 'DELETE' });
                loadProjects();
            }
        }
        
        function closeModal() {
            document.getElementById('projectModal').style.display = 'none';
        }
        
        loadClients();
        loadProjects();
    </script>
</body>
</html>
